<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense &amp; Budget Visualizer</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header>
    <h1>Expense &amp; Budget Visualizer</h1>
    <button id="theme-toggle" type="button" aria-label="Toggle dark/light theme">Toggle Theme</button>
  </header>

  <main>
    <section aria-label="Total Balance">
      <h2>Total Balance</h2>
      <p id="total-balance">Rp0.00</p>
    </section>

    <section aria-label="Add Transaction">
      <h2>Add Transaction</h2>
      <form id="transaction-form" novalidate>
        <div>
          <label for="item-name">Item Name</label>
          <input type="text" id="item-name" name="item-name" placeholder="e.g. Coffee" autocomplete="off" />
        </div>
        <div>
          <label for="amount">Amount</label>
          <input type="number" id="amount" name="amount" placeholder="e.g. 10.000" min="1" step="1" />
        </div>
        <div>
          <label for="category">Category</label>
          <select id="category" name="category">
            <option value="Food">Food</option>
            <option value="Transport">Transport</option>
            <option value="Fun">Fun</option>
          </select>
        </div>
        <button type="submit">Add Transaction</button>
      </form>
    </section>

    <section aria-label="Add Custom Category">
      <h2>Add Category</h2>
      <form id="category-form" novalidate>
        <div>
          <label for="category-name">Category Name</label>
          <input type="text" id="category-name" name="category-name" placeholder="e.g. Travel" autocomplete="off" />
        </div>
        <button type="submit">Add Category</button>
      </form>
    </section>

    <section aria-label="Transaction List">
      <h2>Transactions</h2>
      <div id="sort-controls">
        <button type="button" data-sort="default">Default</button>
        <button type="button" data-sort="amount">Sort by Amount</button>
        <button type="button" data-sort="category">Sort by Category</button>
      </div>
      <ul id="transaction-list" aria-live="polite">
        <!-- Transactions rendered here by js/app.js -->
      </ul>
    </section>

    <section aria-label="Spending Chart">
      <h2>Spending by Category</h2>
      <div id="chart-container">
        <canvas id="chart-canvas" width="300" height="300" aria-label="Pie chart of spending by category" role="img"></canvas>
      </div>
    </section>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
